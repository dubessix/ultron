<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>IRIS AI - Voice-First AI Assistant</title>

    <meta
      http-equiv="Content-Security-Policy"
      content="
    default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
    script-src * 'unsafe-inline' 'unsafe-eval' data: blob: https://cdn.jsdelivr.net https://js.puter.com;
    worker-src * 'unsafe-inline' 'unsafe-eval' data: blob:;
    connect-src * data: blob: 'unsafe-inline';
    img-src * data: blob: file: 'unsafe-inline';
    media-src * data: blob: file: 'unsafe-inline';
    style-src * 'unsafe-inline';
  "
    />
  </head>

  <style>
    /* Anti-flash: prevent white flash before React mounts */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { background: #000; color: #fff; }
    [data-theme='light'] body { background: #f8fafc; color: #0f172a; }
    #root { height: 100%; }
    #splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 999999; transition: opacity 0.3s; }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse-dot 1.5s ease-in-out infinite; }
    @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }
  </style>
  <body class="overflow-hidden">
    <div id="splash"><div id="splash-dot"></div></div>
    <div id="root"></div>
    <script>
      // Hide splash when React mounts
      window.addEventListener('app-ready', function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function() { s.remove(); }, 400); }
      });
      // Fallback: hide after 3s no matter what
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(function() { s.remove(); }, 400); }
      }, 3000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
